<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vivo Care Connect</title>
  <link rel="icon" type="image/png" href="assets/vivo-icon.png">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css">

  <!-- Demo App Design System -->
  <link rel="stylesheet" href="_ds/demo-app-design-system-32a21dcd-4d73-4244-8aad-2747398c9476/colors_and_type.css">
  <link rel="stylesheet" href="_ds/demo-app-design-system-32a21dcd-4d73-4244-8aad-2747398c9476/ui_kits/demo-app/styles.css">
  <link rel="stylesheet" href="_ds/demo-app-design-system-32a21dcd-4d73-4244-8aad-2747398c9476/ui_kits/demo-app/tokens.css">

  <!-- Vivo domain layer -->
  <link rel="stylesheet" href="app/vivo.css">

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Design system component bundle (plain JS) -->
  <script src="_ds/demo-app-design-system-32a21dcd-4d73-4244-8aad-2747398c9476/_ds_bundle.js"></script>

  <style>
    html, body { margin: 0; height: 100%; }
    #root { min-height: 100vh; }
    /* loading splash */
    #boot { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--app-bg-secondary); z-index: 9999; transition: opacity .3s ease; }
    #boot img { height: 40px; opacity: 0.9; animation: bp 1.4s ease-in-out infinite; }
    @keyframes bp { 0%,100% { opacity: .45; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <div id="boot"><img src="assets/vivo-logo-color.png" alt="Vivo"></div>
  <div id="root"></div>

  <!-- Vivo app (JSX, transpiled by Babel) -->
  <script type="text/babel" src="app/vivo-data.jsx"></script>
  <script type="text/babel" src="app/vivo-widgets.jsx"></script>
  <script type="text/babel" src="app/vivo-screens-a.jsx"></script>
  <script type="text/babel" src="app/vivo-screens-b.jsx"></script>
  <script type="text/babel" src="app/vivo-screens-c.jsx"></script>
  <script type="text/babel" src="app/vivo-app.jsx"></script>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" fill="#e7f1fb"/>
      <circle cx="50" cy="30" r="7" fill="#f5a623"/>
      <path d="M30 78 Q42 50 48 40" stroke="#2480c0" stroke-width="7" fill="none" stroke-linecap="round"/>
      <path d="M68 40 Q60 50 56 58" stroke="#1aa35a" stroke-width="7" fill="none" stroke-linecap="round"/>
    </svg>
  </template>
</body>
</html>
